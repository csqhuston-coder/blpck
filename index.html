<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
#err {
  position: fixed;
  inset: 0;
  padding: 20px;
  color: #f44;
  font-family: monospace;
  font-size: 11px;
  white-space: pre-wrap;
  overflow: auto;
  z-index: 100;
  background: #000;
  display: none;
}
</style>
</head>
<body>
<div id="err"></div>
<script>
function showErr(msg) {
  const el = document.getElementById('err');
  el.style.display = 'block';
  el.innerText = msg;
}

try {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;';
  document.body.appendChild(canvas);
  const gl = canvas.getContext('webgl');
  if (!gl) { showErr('WebGL not available'); throw new Error('nogl'); }

  // Check uniform limits
  const maxFragUniforms = gl.getParameter(gl.MAX_FRAGMENT_UNIFORM_VECTORS);
  const maxVertUniforms = gl.getParameter(gl.MAX_VERTEX_UNIFORM_VECTORS);

  const vs = `attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }`;
  const fs = `precision highp float;
uniform float u_pkt[96];
uniform vec4 u_imp[16];
uniform vec2 u_res;
uniform float u_time;
void main() {
  float sum = u_pkt[0] + u_imp[0].x + u_res.x + u_time;
  gl_FragColor = vec4(0.5, 0.0, 0.5, 1.0);
}`;

  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      const info = gl.getShaderInfoLog(s);
      throw new Error('Shader compile:\n' + info);
    }
    return s;
  }

  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    throw new Error('Link:\n' + gl.getProgramInfoLog(p));
  }

  showErr(
    'WebGL OK\n' +
    'Max frag uniforms: ' + maxFragUniforms + ' vec4 (' + (maxFragUniforms * 4) + ' floats)\n' +
    'Max vert uniforms: ' + maxVertUniforms + ' vec4\n' +
    'Packet array: 96 floats = ' + (96/4) + ' vec4\n' +
    'Impression array: 16 vec4 = 64 floats\n' +
    'Total needed: ~' + (24 + 16 + 1) + ' vec4\n\n' +
    'Uniform test PASSED. Shader complexity may be the real issue.'
  );
} catch (e) {
  showErr('ERROR:\n' + e.message);
}
</script>
</body>
</html>
