<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
let W, H, mouse = { x: -9999, y: -9999 };

function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
document.addEventListener('touchmove', e => {
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: true });

const NUM = 120;
const particles = Array.from({ length: NUM }, () => ({
  x: Math.random() * window.innerWidth,
  y: Math.random() * window.innerHeight,
  vx: (Math.random() - 0.5) * 0.4,
  vy: (Math.random() - 0.5) * 0.4,
  r: Math.random() * 1.5 + 0.3,
  hue: Math.random() * 360,
  alpha: 0,
  targetAlpha: Math.random() * 0.12 + 0.02,
  born: Date.now() + Math.random() * 3000,
}));

function draw() {
  const now = Date.now();
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  for (let i = 0; i < NUM; i++) {
    const p = particles[i];

    // Fade in staggered on load
    if (now > p.born) {
      p.alpha += (p.targetAlpha - p.alpha) * 0.02;
    }

    // Gentle autonomous drift — always moving
    p.vx += Math.sin(now * 0.0003 + i * 0.8) * 0.004;
    p.vy += Math.cos(now * 0.0003 + i * 0.5) * 0.004;

    const dx = mouse.x - p.x;
    const dy = mouse.y - p.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 180) {
      p.vx += (dx / dist) * 0.06;
      p.vy += (dy / dist) * 0.06;
    }

    p.vx *= 0.97;
    p.vy *= 0.97;
    p.x += p.vx;
    p.y += p.vy;
    p.hue += 0.4;

    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;

    for (let j = i + 1; j < NUM; j++) {
      const q = particles[j];
      const ex = p.x - q.x;
      const ey = p.y - q.y;
      const ed = Math.sqrt(ex * ex + ey * ey);
      if (ed < 90) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `hsla(${p.hue},70%,65%,${0.06 * (1 - ed / 90)})`;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},60%,70%,${p.alpha})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
