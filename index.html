<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<div style="color:#444;font-family:monospace;padding:40px;">WebGL required</div>'; } else {

// ============================================================
//  TOUCH MEMORY — the butterfly effect substrate
//  We keep a rolling history of up to 12 touch impressions.
//  Each one decays over time but influences the field while alive.
//  New touches can amplify existing ones (call & response).
// ============================================================
const MAX_IMPRESSIONS = 12;
const impressions = new Float32Array(MAX_IMPRESSIONS * 4); // x, y, bornAt, intensity

const vs = `attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }`;

const fs = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec4 u_imp[${MAX_IMPRESSIONS}];

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = p * 2.03 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

// Swing function: uneven subdivision (2/3, 1/3) instead of (1/2, 1/2)
// This is the jazz "lilt" — notes don't fall on the grid
float swing(float t) {
  float phase = fract(t);
  // Triplet swing: first half takes 0.666, second half 0.333
  if (phase < 0.666) return floor(t) + phase * 0.75;
  return floor(t) + 0.5 + (phase - 0.666) * 1.5;
}

// Domain-warped fbm with its own temporal offset
float warpedFbm(vec2 p, float t) {
  vec2 q = vec2(fbm(p + t * 0.05), fbm(p + vec2(5.2, 1.3) - t * 0.04));
  vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.03),
                fbm(p + 4.0 * q + vec2(8.3, 2.8) - t * 0.02));
  return fbm(p + 4.0 * r);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res.xy;
  vec2 p = uv;
  p.x *= u_res.x / u_res.y;

  // ==========================================================
  //  POLYRHYTHM — prime-number periods, never re-align
  //  Three layers of time, each on its own meter
  //  7s, 11s, 13s — the LCM is 1001 seconds (~16 min)
  //  Applied to different aspects of the field
  // ==========================================================
  float T1 = swing(u_time / 7.0) * 7.0;   // slow — governs base structure
  float T2 = swing(u_time / 11.0) * 11.0; // mid — governs warping
  float T3 = swing(u_time / 13.0) * 13.0; // fast — governs color shift
  float T5 = u_time / 5.0;                // cross-rhythm — 5 against 7

  // ==========================================================
  //  EDGE AWARENESS — the field reflects off boundaries
  //  Distance to nearest edge modulates intensity and warping
  //  Corners are denser, edges are active, center is open
  // ==========================================================
  vec2 edgeDist = min(uv, 1.0 - uv);
  float edgeNear = 1.0 - smoothstep(0.0, 0.35, min(edgeDist.x, edgeDist.y));
  float cornerPool = (1.0 - smoothstep(0.0, 0.3, edgeDist.x)) * (1.0 - smoothstep(0.0, 0.3, edgeDist.y));

  // ==========================================================
  //  TOUCH MEMORY — butterfly effect
  //  Every past touch ripples outward, decaying over ~4 seconds
  //  The sum of all ripples is a living echo of interaction
  // ==========================================================
  vec2 displacement = vec2(0.0);
  float touchEnergy = 0.0;

  for (int i = 0; i < ${MAX_IMPRESSIONS}; i++) {
    vec4 imp = u_imp[i];
    if (imp.w < 0.01) continue;

    vec2 impP = imp.xy / u_res.xy;
    impP.x *= u_res.x / u_res.y;

    float age = u_time - imp.z;
    float life = max(0.0, 1.0 - age / 4.0);
    float dist = distance(p, impP);

    // Expanding ring — the ripple propagates outward over time
    float ringRadius = age * 0.25;
    float ring = exp(-pow((dist - ringRadius) * 6.0, 2.0)) * life;

    // Local pooling — residue at the touch point
    float pool = exp(-dist * 8.0) * life * 0.5;

    // Sum of influences
    touchEnergy += (ring + pool) * imp.w;

    // Displacement vector — the field is pulled toward past touches
    vec2 toward = normalize(p - impP + 0.0001);
    displacement += toward * ring * 0.04 * imp.w;
  }

  // Apply accumulated displacement to sampling position
  p += displacement;

  // ==========================================================
  //  LAYERED NOISE — three polyrhythmic layers
  //  Each on its own time signature, never synced
  // ==========================================================
  float n1 = warpedFbm(p * 1.4 + vec2(T1 * 0.3, T2 * 0.2), T1 * 0.1);
  float n2 = warpedFbm(p * 2.6 - vec2(T2 * 0.4, T3 * 0.15), T2 * 0.15);
  float n3 = warpedFbm(p * 4.5 + vec2(T3 * 0.25, T1 * 0.1), T3 * 0.2);

  // Mix weights breathe polyrhythmically — the layers fade in and out of dominance
  float w1 = 0.5 + 0.4 * sin(T1 * 0.9);
  float w2 = 0.5 + 0.4 * sin(T2 * 0.7 + 1.3);
  float w3 = 0.5 + 0.4 * sin(T3 * 1.1 + 2.1);
  float wSum = w1 + w2 + w3;
  float n = (n1 * w1 + n2 * w2 + n3 * w3) / wSum;

  // Touch energy lifts the noise where it has been
  n += touchEnergy * 0.5;

  // Edge awareness — field is more active near edges
  n += edgeNear * 0.08;
  n += cornerPool * 0.15;

  // ==========================================================
  //  FULL DICHROIC PALETTE — all colors present, rotating
  //  Tension/release: saturation breathes on its own rhythm
  // ==========================================================
  vec3 col = vec3(0.0);

  // Phase-shifted color cycling — each color has its own clock
  float cyc1 = sin(T1 * 0.5) * 0.5 + 0.5;
  float cyc2 = sin(T2 * 0.6 + 1.0) * 0.5 + 0.5;
  float cyc3 = sin(T3 * 0.7 + 2.0) * 0.5 + 0.5;
  float cyc5 = sin(T5 * 0.4 + 3.0) * 0.5 + 0.5;

  // Indigo (deep blue-violet) — always present, strongest at low n
  col += vec3(0.12, 0.08, 0.35) * smoothstep(0.25, 0.7, n) * (0.7 + cyc1 * 0.5);

  // Magenta — mid range, pulses on T2
  col += vec3(0.55, 0.1, 0.42) * smoothstep(0.45, 0.82, n) * (0.5 + cyc2 * 0.8);

  // Teal — rises where n2 is dominant
  col += vec3(0.05, 0.6, 0.55) * smoothstep(0.55, 0.85, n2) * (0.4 + cyc3 * 0.9);

  // Cyan — rim light, appears in darker regions
  col += vec3(0.15, 0.4, 0.7) * smoothstep(0.2, 0.45, n) * (0.3 + cyc5 * 0.6);

  // Amber — rare fire flash, more common now (dichroic opal)
  col += vec3(0.95, 0.5, 0.15) * smoothstep(0.72, 0.95, n3) * (0.3 + cyc1 * 0.7);

  // Emerald — rare green glint
  col += vec3(0.1, 0.7, 0.35) * smoothstep(0.78, 0.97, n1) * (0.2 + cyc2 * 0.5);

  // Violet hot spike — from touch energy
  col += vec3(0.7, 0.35, 0.95) * touchEnergy * 1.2;

  // Tension/release: global saturation breathes on cross-rhythm
  float tension = 0.85 + sin(T5 * 0.3) * 0.15;
  col *= tension;

  // Deep vignette — rooted in blackness
  float vig = smoothstep(1.3, 0.3, distance(uv, vec2(0.5)));
  col *= vig * 0.95 + 0.05;

  // Film grain — baked into the material
  float grain = (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.035;
  col += grain;

  // Slow fade in
  col *= smoothstep(0.0, 5.0, u_time);

  // Crush darks — keep it rooted
  col = pow(col, vec3(1.12));

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uImpressions = [];
for (let i = 0; i < MAX_IMPRESSIONS; i++) {
  uImpressions.push(gl.getUniformLocation(prog, `u_imp[${i}]`));
}

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  canvas.width = window.innerWidth * DPR;
  canvas.height = window.innerHeight * DPR;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

// ============================================================
//  IMPRESSION RECORDING
//  New touches rotate through the buffer.
//  If a new touch lands near an old one, it amplifies that one
//  instead of using a new slot — this is call & response
// ============================================================
let impIdx = 0;
const start = performance.now();

function recordImpression(x, y) {
  const now = (performance.now() - start) / 1000;
  const canvasX = x * DPR;
  const canvasY = (window.innerHeight - y) * DPR;

  // Check for nearby existing impression (call & response)
  let amplified = false;
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    const ix = impressions[i * 4];
    const iy = impressions[i * 4 + 1];
    const iborn = impressions[i * 4 + 2];
    const iint = impressions[i * 4 + 3];
    const age = now - iborn;
    if (iint > 0.1 && age < 3.0) {
      const dx = canvasX - ix;
      const dy = canvasY - iy;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 120 * DPR) {
        impressions[i * 4 + 3] = Math.min(1.8, iint + 0.4); // amplify
        amplified = true;
        break;
      }
    }
  }

  if (!amplified) {
    impressions[impIdx * 4]     = canvasX;
    impressions[impIdx * 4 + 1] = canvasY;
    impressions[impIdx * 4 + 2] = now;
    impressions[impIdx * 4 + 3] = 1.0;
    impIdx = (impIdx + 1) % MAX_IMPRESSIONS;
  }
}

let lastTrack = 0;
function track(x, y) {
  const now = performance.now();
  // Throttle to avoid saturating the buffer with every mousemove event
  if (now - lastTrack < 80) return;
  lastTrack = now;
  recordImpression(x, y);
}

document.addEventListener('mousemove', e => track(e.clientX, e.clientY));
document.addEventListener('touchmove', e => track(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
document.addEventListener('touchstart', e => track(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

function render() {
  const t = (performance.now() - start) / 1000;

  // Decay all impressions
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    const age = t - impressions[i * 4 + 2];
    if (age > 4.0) impressions[i * 4 + 3] = 0;
  }

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    gl.uniform4f(uImpressions[i],
      impressions[i * 4],
      impressions[i * 4 + 1],
      impressions[i * 4 + 2],
      impressions[i * 4 + 3]
    );
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();

}
</script>
</body>
</html>
