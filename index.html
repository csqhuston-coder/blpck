<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; touch-action: none; }
#stage {
  position: fixed; inset: 0; touch-action: none;
}

#log {
  position: fixed; top: 60px; left: 10px; right: 10px;
  color: #0f0; font-family: monospace; font-size: 11px;
  z-index: 1000; background: rgba(0,0,0,0.85); padding: 8px;
  max-height: 220px; overflow: hidden;
  border: 1px solid #0f0; pointer-events: none;
  white-space: pre-wrap;
}

#plusContainer {
  position: absolute;
  top: 50%; left: 50%;
  width: 96px; height: 96px;
  margin-left: -48px; margin-top: -48px;
  z-index: 5;
  pointer-events: auto;
}
#plus {
  width: 100%; height: 100%;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#plus svg { width: 100%; height: 100%; display: block; }
#plusContainer.panelOpen #plus {
  transform: rotate(45deg) scale(0.85);
}

.orbit {
  position: absolute;
  top: 50%; left: 50%;
  width: 59px; height: 59px;
  margin-left: -29.5px; margin-top: -29.5px;
  opacity: 0;
  pointer-events: none;
  cursor: pointer;
  transform: translate(0, 0);
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
}
#plusContainer.panelOpen .orbit { opacity: 1; pointer-events: auto; }
.orbit svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div id="stage">
  <div id="plusContainer">
    <div id="plus">
      <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#fff" stroke-width="2.5"/><path d="M 50 28 L 50 72 M 28 50 L 72 50" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
    </div>
  </div>
</div>
<div id="log">init...</div>

<script>
const log = document.getElementById('log');
let logLines = ['init...'];
function L(m) {
  logLines.unshift(new Date().toTimeString().slice(0,8) + ' ' + m);
  if (logLines.length > 12) logLines.pop();
  log.innerText = logLines.join('\n');
}

window.addEventListener('error', e => L('ERR: ' + e.message + ' L' + e.lineno));

const stage = document.getElementById('stage');
const plusContainer = document.getElementById('plusContainer');
const plusBtn = document.getElementById('plus');

L('DOM: plusBtn=' + !!plusBtn + ' container=' + !!plusContainer);

// Build orbits
const ORBIT_RADIUS = 140;
const icons = ['paperclip', 'text', 'mic'];
icons.forEach(name => {
  const el = document.createElement('div');
  el.className = 'orbit';
  el.dataset.type = name;
  el.innerHTML = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#0ff" stroke-width="2.5"/><text x="50" y="58" text-anchor="middle" fill="#0ff" font-size="20" font-family="monospace">${name[0].toUpperCase()}</text></svg>`;
  plusContainer.appendChild(el);
});
L('Orbits built: ' + icons.length);

let panelOpen = false;
function placeOrbits() {
  const orbs = plusContainer.querySelectorAll('.orbit');
  orbs.forEach((el, i) => {
    const angle = (i / orbs.length) * Math.PI * 2 - Math.PI / 2;
    const x = Math.cos(angle) * ORBIT_RADIUS;
    const y = Math.sin(angle) * ORBIT_RADIUS;
    el.style.transform = panelOpen ? `translate(${x}px, ${y}px)` : 'translate(0,0)';
  });
}
placeOrbits();

// Stage listeners — these existed in the broken version
stage.addEventListener('touchstart', e => {
  L('STAGE touchstart target=' + e.target.tagName + '#' + (e.target.id||'no-id'));
}, { passive: false });

stage.addEventListener('mousedown', e => {
  L('STAGE mousedown target=' + e.target.tagName + '#' + (e.target.id||'no-id'));
});

// Plus button click
plusBtn.addEventListener('click', e => {
  L('PLUS click! panelOpen→' + (!panelOpen));
  e.stopPropagation();
  panelOpen = !panelOpen;
  plusContainer.classList.toggle('panelOpen', panelOpen);
  placeOrbits();
});

// Also try touchstart on plus directly
plusBtn.addEventListener('touchstart', e => {
  L('PLUS touchstart');
}, { passive: false });

L('All handlers bound');
</script>
</body>
</html>
