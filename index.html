<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

if (!gl) {
  document.body.innerHTML = '<div style="color:#444;font-family:monospace;padding:40px;">WebGL required</div>';
} else {

const vs = `
attribute vec2 p;
void main() { gl_Position = vec4(p, 0.0, 1.0); }
`;

const fs = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec2 u_mouse;
uniform float u_mouseActive;

// Hash + noise functions for organic turbulence
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

// Fractal brownian motion — layered noise for that oily, turbulent feel
float fbm(vec2 p) {
  float v = 0.0;
  float a = 0.5;
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p = p * 2.03 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

// Domain-warped fbm — this is where Turner's atmospheric roiling comes from
float warpedFbm(vec2 p, float t) {
  vec2 q = vec2(
    fbm(p + vec2(0.0, 0.0) + t * 0.05),
    fbm(p + vec2(5.2, 1.3) - t * 0.04)
  );
  vec2 r = vec2(
    fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.03),
    fbm(p + 4.0 * q + vec2(8.3, 2.8) - t * 0.02)
  );
  return fbm(p + 4.0 * r);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res.xy;
  vec2 p = uv;
  p.x *= u_res.x / u_res.y;

  float t = u_time * 0.08;

  // Mouse displacement — presses into the surface
  vec2 mouseUV = u_mouse / u_res.xy;
  mouseUV.x *= u_res.x / u_res.y;
  float mdist = distance(p, mouseUV);
  float press = u_mouseActive * smoothstep(0.5, 0.0, mdist) * 0.4;
  p += normalize(p - mouseUV + 0.0001) * press * 0.08;

  // Two layers of warped noise — one slow underbody, one faster surface
  float n1 = warpedFbm(p * 1.4 + vec2(t * 0.3, t * 0.2), t);
  float n2 = warpedFbm(p * 3.0 - vec2(t * 0.4, t * 0.15), t * 1.5);
  float n = mix(n1, n2, 0.35);

  // Mouse makes the material ripple where touched
  n += press * 0.6;

  // Black opal palette — deep indigo, violet, magenta, teal, rare amber glints
  // Colors emerge from the noise field like light through wet pigment
  vec3 col = vec3(0.0);

  // Deep blue-violet base (Turner's storm color)
  col += vec3(0.08, 0.05, 0.22) * smoothstep(0.3, 0.75, n);

  // Magenta bleed
  col += vec3(0.45, 0.08, 0.35) * smoothstep(0.5, 0.85, n) * 0.7;

  // Teal glint in the bright breaks
  col += vec3(0.05, 0.55, 0.55) * smoothstep(0.68, 0.92, n1) * 0.5;

  // Amber — rare, only in the brightest breaks (dichroic opal flash)
  col += vec3(0.85, 0.45, 0.15) * smoothstep(0.85, 0.98, n2) * 0.35;

  // Cyan rim in dark areas
  col += vec3(0.1, 0.25, 0.45) * smoothstep(0.2, 0.4, n) * 0.3;

  // Deep vignette — keeps it rooted in blackness
  float vig = smoothstep(1.3, 0.3, distance(uv, vec2(0.5)));
  col *= vig * 0.95 + 0.05;

  // Subtle film grain — actual material noise, not overlay
  float grain = (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.035;
  col += grain;

  // Slow reveal from black on load
  float fadeIn = smoothstep(0.0, 5.0, u_time);
  col *= fadeIn;

  // Heavy crush on the darks — keeps it mostly black
  col = pow(col, vec3(1.15));

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uMouseActive = gl.getUniformLocation(prog, 'u_mouseActive');

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  canvas.width = window.innerWidth * DPR;
  canvas.height = window.innerHeight * DPR;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let mouse = { x: -9999, y: -9999, active: 0, lastMove: 0 };

function track(x, y) {
  mouse.x = x * DPR;
  mouse.y = (window.innerHeight - y) * DPR;
  mouse.active = 1;
  mouse.lastMove = performance.now();
}
document.addEventListener('mousemove', e => track(e.clientX, e.clientY));
document.addEventListener('touchmove', e => track(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
document.addEventListener('touchstart', e => track(e.touches[0].clientX, e.touches[0].clientY), { passive: true });

const start = performance.now();
function render() {
  const now = performance.now();
  const t = (now - start) / 1000;

  // Mouse influence fades out when idle
  if (now - mouse.lastMove > 800) {
    mouse.active = Math.max(0, mouse.active - 0.015);
  }

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uMouse, mouse.x, mouse.y);
  gl.uniform1f(uMouseActive, mouse.active);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();

}
</script>
</body>
</html>
