<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
#stage { position: fixed; inset: 0; overflow: hidden; touch-action: none; }
#base, #overlay {
  position: absolute; inset: 0; width: 100%; height: 100%; display: block;
}
#base { z-index: 1; }
#overlay { z-index: 2; mix-blend-mode: screen; pointer-events: none; }
#stage[data-invert="1"] #base { filter: invert(1) hue-rotate(180deg); }
#stage[data-strobe="1"] #base { filter: contrast(2.5) saturate(3); }
#stage[data-strobe="1"][data-invert="1"] #base { filter: invert(1) contrast(2.5) saturate(3); }
</style>
</head>
<body>
<div id="stage">
  <canvas id="base"></canvas>
  <canvas id="overlay"></canvas>
</div>
<script>
// =============================================================
//  PALETTE LIBRARY — 15 distinct color philosophies
//  Each palette has its own color vocabulary + relationship logic
// =============================================================
const PALETTES = {
  opal:       { colors: ['#1a1a4e', '#4a0e8a', '#8e1b5e', '#0a5f6e', '#d4a03c', '#9c2ea8'], mood: 'deep' },
  solarToxic: { colors: ['#f6ff00', '#ff0080', '#00ff7f', '#ff4500', '#39ff14', '#ff00ff'], mood: 'neon' },
  bloodMoon:  { colors: ['#4a0000', '#8b0000', '#d2691e', '#ffb400', '#1a0505', '#ff4500'], mood: 'warm' },
  medical:    { colors: ['#5a9fd4', '#ffffff', '#c41e3a', '#e8f4f8', '#0a3d62', '#ff6b6b'], mood: 'sterile' },
  rave:       { colors: ['#8a2be2', '#00ffff', '#ff1493', '#7b68ee', '#00fa9a', '#ff00ff'], mood: 'neon' },
  oilSlick:   { colors: ['#1a1a2e', '#3d1e6d', '#0d3a4c', '#6a0dad', '#4a3a5c', '#8b008b'], mood: 'deep' },
  candy:      { colors: ['#ffd1dc', '#b4f8c8', '#fffacd', '#e6e6fa', '#fbc4ab', '#c9a0dc'], mood: 'soft' },
  warning:    { colors: ['#ffdd00', '#ff8c00', '#e60000', '#000000', '#ffbb00', '#cc0000'], mood: 'warm' },
  cyberpunk:  { colors: ['#ff00ff', '#00ffff', '#39ff14', '#ff0080', '#0080ff', '#ffff00'], mood: 'neon' },
  plasma:     { colors: ['#8b00ff', '#ff1493', '#ff8c00', '#00ced1', '#ffd700', '#ff00bf'], mood: 'warm' },
  mold:       { colors: ['#8b7355', '#556b2f', '#c71585', '#654321', '#9acd32', '#8b4513'], mood: 'earth' },
  monoViolet: { colors: ['#000000', '#ffffff', '#8a2be2', '#0a0a0a', '#2a2a2a', '#c71585'], mood: 'stark' },
  bruise:     { colors: ['#4a0e4a', '#8b0000', '#808000', '#2f004f', '#3d1e00', '#5c0d3a'], mood: 'deep' },
  holo:       { colors: ['#c0c0c0', '#ff69b4', '#00ced1', '#e6e6fa', '#b0e0e6', '#dda0dd'], mood: 'soft' },
  analog:     { colors: ['#c71585', '#d4a017', '#4682b4', '#8b4513', '#deb887', '#cd5c5c'], mood: 'faded' }
};
const PALETTE_KEYS = Object.keys(PALETTES);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}
function rgbStr(rgb, a) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a})`; }

function randomPalette() {
  return PALETTES[PALETTE_KEYS[Math.floor(Math.random() * PALETTE_KEYS.length)]];
}
function pickColor(palette) {
  return hexToRgb(palette.colors[Math.floor(Math.random() * palette.colors.length)]);
}

// =============================================================
//  BASE WEBGL LAYER
// =============================================================
const baseCanvas = document.getElementById('base');
const overlayCanvas = document.getElementById('overlay');
const stage = document.getElementById('stage');
const gl = baseCanvas.getContext('webgl') || baseCanvas.getContext('experimental-webgl');
const ctx2d = overlayCanvas.getContext('2d');

if (!gl) { document.body.innerHTML = '<div style="color:#444;font-family:monospace;padding:40px;">WebGL required</div>'; } else {

const MAX_IMPRESSIONS = 16;
const IMP_LIFE = 30.0;
const impressions = new Float32Array(MAX_IMPRESSIONS * 4);

// Base field palette — rotates subtly every 25-40 seconds
let baseFieldPalette = PALETTES.opal;
let nextBasePaletteAt = 30 + Math.random() * 15;

const vs = `attribute vec2 p; varying vec2 v_uv;
void main() { v_uv = p * 0.5 + 0.5; gl_Position = vec4(p, 0.0, 1.0); }`;

const fs = `
precision highp float;
varying vec2 v_uv;
uniform vec2 u_res;
uniform float u_time;
uniform vec4 u_imp[${MAX_IMPRESSIONS}];
uniform float u_chromaticAberration;
uniform float u_mirrorMix;
uniform float u_warpAmt;
uniform vec3 u_c0;
uniform vec3 u_c1;
uniform vec3 u_c2;
uniform vec3 u_c3;
uniform vec3 u_c4;
uniform vec3 u_c5;
uniform float u_paletteBlend;
uniform vec3 u_c0b;
uniform vec3 u_c1b;
uniform vec3 u_c2b;
uniform vec3 u_c3b;
uniform vec3 u_c4b;
uniform vec3 u_c5b;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = p * 2.03 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

float swing(float t) {
  float phase = fract(t);
  if (phase < 0.666) return floor(t) + phase * 0.75;
  return floor(t) + 0.5 + (phase - 0.666) * 1.5;
}

float warpedFbm(vec2 p, float t) {
  vec2 q = vec2(fbm(p + t * 0.05), fbm(p + vec2(5.2, 1.3) - t * 0.04));
  vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.03),
                fbm(p + 4.0 * q + vec2(8.3, 2.8) - t * 0.02));
  return fbm(p + 4.0 * r);
}

vec3 sampleField(vec2 uv) {
  vec2 p = uv;
  p.x *= u_res.x / u_res.y;

  float T1 = swing(u_time / 9.0) * 9.0;
  float T2 = swing(u_time / 14.0) * 14.0;
  float T3 = swing(u_time / 17.0) * 17.0;
  float T5 = u_time / 6.5;

  float energy = 0.0;
  vec2 flow = vec2(0.0);
  float heatRecent = 0.0;
  for (int i = 0; i < ${MAX_IMPRESSIONS}; i++) {
    vec4 imp = u_imp[i];
    if (imp.w < 0.001) continue;
    vec2 impP = imp.xy / u_res.xy;
    impP.x *= u_res.x / u_res.y;
    float age = u_time - imp.z;
    float life = max(0.0, 1.0 - age / ${IMP_LIFE.toFixed(1)});
    life = life * life * (3.0 - 2.0 * life);
    float dist = distance(p, impP);
    vec2 outward = normalize(p - impP + 0.0001);
    float core = exp(-dist * 10.0) * life;
    energy += core * 0.7 * imp.w;
    flow += outward * core * 0.15 * imp.w;
    if (age < 1.5) heatRecent += core * imp.w * (1.0 - age / 1.5);
  }
  p += flow * 0.12;

  p += vec2(sin(u_time * 2.0 + uv.y * 10.0), cos(u_time * 1.7 + uv.x * 10.0)) * u_warpAmt;

  vec2 edgeDist = min(uv, 1.0 - uv);
  float edgeNear = 1.0 - smoothstep(0.0, 0.35, min(edgeDist.x, edgeDist.y));
  float cornerPool = (1.0 - smoothstep(0.0, 0.3, edgeDist.x)) * (1.0 - smoothstep(0.0, 0.3, edgeDist.y));

  float n1 = warpedFbm(p * 1.4 + vec2(T1 * 0.2, T2 * 0.13), T1 * 0.07);
  float n2 = warpedFbm(p * 2.6 - vec2(T2 * 0.25, T3 * 0.1), T2 * 0.1);
  float n3 = warpedFbm(p * 4.5 + vec2(T3 * 0.18, T1 * 0.07), T3 * 0.13);

  float w1 = 0.5 + 0.4 * sin(T1 * 0.6);
  float w2 = 0.5 + 0.4 * sin(T2 * 0.45 + 1.3);
  float w3 = 0.5 + 0.4 * sin(T3 * 0.75 + 2.1);
  float n = (n1 * w1 + n2 * w2 + n3 * w3) / (w1 + w2 + w3);
  n += edgeNear * 0.06 + cornerPool * 0.12;

  float cyc1 = sin(T1 * 0.35) * 0.5 + 0.5;
  float cyc2 = sin(T2 * 0.4 + 1.0) * 0.5 + 0.5;
  float cyc3 = sin(T3 * 0.5 + 2.0) * 0.5 + 0.5;
  float cyc5 = sin(T5 * 0.3 + 3.0) * 0.5 + 0.5;

  // Palette A
  vec3 colA = vec3(0.0);
  colA += u_c0 * smoothstep(0.18, 0.38, n) * (1.0 - smoothstep(0.48, 0.62, n)) * (0.4 + cyc5 * 0.5);
  colA += u_c1 * smoothstep(0.30, 0.55, n) * (1.0 - smoothstep(0.62, 0.78, n)) * (0.7 + cyc1 * 0.4);
  colA += u_c2 * smoothstep(0.48, 0.72, n2) * (0.5 + cyc3 * 0.9);
  colA += u_c3 * smoothstep(0.58, 0.82, n) * (0.4 + cyc2 * 0.7);
  colA += u_c4 * smoothstep(0.75, 0.92, n3) * (0.4 + cyc1 * 0.6);
  colA += u_c5 * smoothstep(0.82, 0.95, n1) * (0.3 + cyc2 * 0.5);

  // Palette B (target for blending)
  vec3 colB = vec3(0.0);
  colB += u_c0b * smoothstep(0.18, 0.38, n) * (1.0 - smoothstep(0.48, 0.62, n)) * (0.4 + cyc5 * 0.5);
  colB += u_c1b * smoothstep(0.30, 0.55, n) * (1.0 - smoothstep(0.62, 0.78, n)) * (0.7 + cyc1 * 0.4);
  colB += u_c2b * smoothstep(0.48, 0.72, n2) * (0.5 + cyc3 * 0.9);
  colB += u_c3b * smoothstep(0.58, 0.82, n) * (0.4 + cyc2 * 0.7);
  colB += u_c4b * smoothstep(0.75, 0.92, n3) * (0.4 + cyc1 * 0.6);
  colB += u_c5b * smoothstep(0.82, 0.95, n1) * (0.3 + cyc2 * 0.5);

  vec3 col = mix(colA, colB, u_paletteBlend);

  col += vec3(0.45, 0.2, 0.7) * min(energy, 1.0) * 0.6;
  col += vec3(0.85, 0.6, 1.0) * min(heatRecent, 1.0) * 0.9;

  float tension = 0.82 + sin(T5 * 0.25) * 0.18;
  col *= tension;
  return col;
}

void main() {
  vec2 uv = v_uv;
  vec3 col = sampleField(uv);
  if (u_mirrorMix > 0.01) {
    vec3 mirrored = sampleField(vec2(1.0 - uv.x, uv.y));
    col = mix(col, mirrored, u_mirrorMix);
  }
  if (u_chromaticAberration > 0.001) {
    vec2 offR = vec2(u_chromaticAberration, 0.0);
    vec2 offB = vec2(-u_chromaticAberration, 0.0);
    vec3 cR = sampleField(uv + offR);
    vec3 cB = sampleField(uv + offB);
    col = vec3(cR.r, col.g, cB.b);
  }
  float vig = smoothstep(1.3, 0.3, distance(uv, vec2(0.5)));
  col *= vig * 0.95 + 0.05;
  float grain = (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.03;
  col += grain;
  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  if (lum > 0.88) col *= 0.88 / lum;
  col *= smoothstep(0.0, 1.2, u_time);
  col = pow(col, vec3(1.15));
  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uChroma = gl.getUniformLocation(prog, 'u_chromaticAberration');
const uMirror = gl.getUniformLocation(prog, 'u_mirrorMix');
const uWarp = gl.getUniformLocation(prog, 'u_warpAmt');
const uPaletteBlend = gl.getUniformLocation(prog, 'u_paletteBlend');
const uC = [gl.getUniformLocation(prog, 'u_c0'), gl.getUniformLocation(prog, 'u_c1'),
            gl.getUniformLocation(prog, 'u_c2'), gl.getUniformLocation(prog, 'u_c3'),
            gl.getUniformLocation(prog, 'u_c4'), gl.getUniformLocation(prog, 'u_c5')];
const uCb = [gl.getUniformLocation(prog, 'u_c0b'), gl.getUniformLocation(prog, 'u_c1b'),
             gl.getUniformLocation(prog, 'u_c2b'), gl.getUniformLocation(prog, 'u_c3b'),
             gl.getUniformLocation(prog, 'u_c4b'), gl.getUniformLocation(prog, 'u_c5b')];
const uImp = [];
for (let i = 0; i < MAX_IMPRESSIONS; i++) uImp.push(gl.getUniformLocation(prog, `u_imp[${i}]`));

// Normalize colors 0-1
function paletteToRgbFloat(pal) {
  return pal.colors.map(h => {
    const rgb = hexToRgb(h);
    return [rgb[0]/255, rgb[1]/255, rgb[2]/255];
  });
}
let currentPaletteRgb = paletteToRgbFloat(baseFieldPalette);
let nextPaletteRgb = currentPaletteRgb;
let paletteBlendAmt = 0;
let paletteBlending = false;

let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  baseCanvas.width = W * DPR;
  baseCanvas.height = H * DPR;
  overlayCanvas.width = W;
  overlayCanvas.height = H;
  gl.viewport(0, 0, baseCanvas.width, baseCanvas.height);
}
resize();
window.addEventListener('resize', resize);

// =============================================================
//  CHAOS ENGINE
// =============================================================
const chaosEvents = [];
let impIdx = 0;
const start = performance.now();
let lastTouch = { x: 0, y: 0, time: 0, hasLast: false };

function recordImpression(x, y) {
  const now = (performance.now() - start) / 1000;
  impressions[impIdx * 4]     = x * DPR;
  impressions[impIdx * 4 + 1] = (H - y) * DPR;
  impressions[impIdx * 4 + 2] = now;
  impressions[impIdx * 4 + 3] = 1.0;
  impIdx = (impIdx + 1) % MAX_IMPRESSIONS;
}

const EFFECTS = ['chroma', 'mirror', 'warp', 'strobe', 'invert', 'tessellate', 'datamosh', 'scanline', 'colorburst'];

function fireChaos(x, y, velocity) {
  const now = (performance.now() - start) / 1000;
  const count = 1 + Math.floor(Math.pow(Math.random(), 1.8) * 4);

  for (let k = 0; k < count; k++) {
    const type = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
    const intensity = 0.3 + Math.random() * 0.7 + Math.min(velocity, 2) * 0.3;

    // Each chaos event picks a random palette from the library
    const palette = randomPalette();
    // Pre-select colors for this event from its palette
    const eventColors = [];
    for (let i = 0; i < 6; i++) eventColors.push(pickColor(palette));

    let duration;
    switch (type) {
      case 'strobe': duration = 0.15 + Math.random() * 0.6; break;
      case 'invert': duration = 0.04 + Math.random() * 0.18; break;
      case 'tessellate': duration = 0.3 + Math.random() * 1.2; break;
      case 'datamosh': duration = 0.2 + Math.random() * 0.5; break;
      case 'scanline': duration = 0.15 + Math.random() * 0.5; break;
      case 'colorburst': duration = 0.2 + Math.random() * 0.6; break;
      case 'chroma': duration = 0.3 + Math.random() * 0.9; break;
      case 'mirror': duration = 0.3 + Math.random() * 1.0; break;
      case 'warp': duration = 0.4 + Math.random() * 1.2; break;
      default: duration = 0.5;
    }

    chaosEvents.push({
      type, intensity, x, y,
      startTime: now, duration,
      seed: Math.random() * 1000,
      param: Math.random(), param2: Math.random(),
      palette, eventColors
    });
  }
  if (chaosEvents.length > 20) chaosEvents.splice(0, chaosEvents.length - 20);
}

function track(x, y) {
  const now = performance.now();
  let velocity = 0;
  if (lastTouch.hasLast) {
    const dt = (now - lastTouch.time) / 1000;
    const dx = x - lastTouch.x;
    const dy = y - lastTouch.y;
    velocity = dt > 0 ? Math.sqrt(dx*dx + dy*dy) / dt / 1000 : 0;
  }
  lastTouch = { x, y, time: now, hasLast: true };
  recordImpression(x, y);
  fireChaos(x, y, velocity);
}

stage.addEventListener('mousemove', e => track(e.clientX, e.clientY));
stage.addEventListener('mousedown', e => track(e.clientX, e.clientY));
stage.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  track(t.clientX, t.clientY);
}, { passive: false });
stage.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  track(t.clientX, t.clientY);
}, { passive: false });
stage.addEventListener('touchend', () => { lastTouch.hasLast = false; });

// =============================================================
//  OVERLAY RENDERING — all colors from event palettes
// =============================================================
function drawOverlay(now) {
  ctx2d.clearRect(0, 0, W, H);

  for (const ev of chaosEvents) {
    const age = now - ev.startTime;
    if (age < 0 || age > ev.duration) continue;
    const life = 1 - age / ev.duration;

    if (ev.type === 'tessellate') {
      const cellSize = 8 + ev.param * 30;
      const cellsX = Math.ceil(W / cellSize);
      const cellsY = Math.ceil(H / cellSize);
      for (let i = 0; i < cellsX; i++) {
        for (let j = 0; j < cellsY; j++) {
          const n = Math.sin(ev.seed + i * 0.7 + j * 1.3 + now * 3);
          if (n > 0.3) {
            // Pick a random color from the event's pre-selected palette colors
            const colorIdx = Math.floor(Math.abs(Math.sin(ev.seed * 7 + i * 13 + j * 17)) * ev.eventColors.length);
            const rgb = ev.eventColors[colorIdx];
            ctx2d.fillStyle = rgbStr(rgb, 0.5 * life * ev.intensity);
            ctx2d.fillRect(i * cellSize, j * cellSize, cellSize - 1, cellSize - 1);
          }
        }
      }
    }

    else if (ev.type === 'datamosh') {
      const blockH = 4 + ev.param * 20;
      const blocks = Math.ceil(H / blockH);
      for (let i = 0; i < blocks; i++) {
        const shift = (Math.sin(ev.seed + i * 0.3 + now * 10) * 0.5 + 0.5) * W * 0.3 * life;
        const colorIdx = Math.floor(Math.abs(Math.sin(ev.seed + i * 11)) * ev.eventColors.length);
        const rgb = ev.eventColors[colorIdx];
        ctx2d.fillStyle = rgbStr(rgb, 0.3 * life * ev.intensity);
        ctx2d.fillRect(shift - W, i * blockH, W * 2, blockH - 1);
      }
    }

    else if (ev.type === 'scanline') {
      const scanCount = 4 + Math.floor(ev.param * 8);
      for (let i = 0; i < scanCount; i++) {
        const y = (ev.seed * 37 + i * 91 + now * 200) % H;
        const lineH = 2 + Math.random() * 6;
        // Scanlines pull from palette too
        const rgb = ev.eventColors[i % ev.eventColors.length];
        ctx2d.fillStyle = rgbStr(rgb, 0.85 * life);
        ctx2d.fillRect(0, y, W, lineH);
      }
    }

    else if (ev.type === 'colorburst') {
      const maxR = Math.max(W, H) * 1.2;
      const r = age * maxR * 2;
      // Pick 3 random colors from palette for the gradient stops
      const c1 = ev.eventColors[0];
      const c2 = ev.eventColors[Math.floor(ev.eventColors.length / 2)];
      const c3 = ev.eventColors[ev.eventColors.length - 1];
      const grad = ctx2d.createRadialGradient(ev.x, ev.y, 0, ev.x, ev.y, r);
      grad.addColorStop(0, rgbStr(c1, 0.7 * life * ev.intensity));
      grad.addColorStop(0.5, rgbStr(c2, 0.35 * life));
      grad.addColorStop(1, rgbStr(c3, 0));
      ctx2d.fillStyle = grad;
      ctx2d.fillRect(0, 0, W, H);
    }
  }
}

// =============================================================
//  RENDER LOOP — base palette rotation + chaos
// =============================================================
function render() {
  const t = (performance.now() - start) / 1000;

  // Base palette rotation
  if (t > nextBasePaletteAt && !paletteBlending) {
    paletteBlending = true;
    const next = randomPalette();
    nextPaletteRgb = paletteToRgbFloat(next);
    baseFieldPalette = next;
    paletteBlendAmt = 0;
  }
  if (paletteBlending) {
    paletteBlendAmt += 0.003; // ~5 seconds to cross-fade
    if (paletteBlendAmt >= 1) {
      currentPaletteRgb = nextPaletteRgb;
      paletteBlendAmt = 0;
      paletteBlending = false;
      nextBasePaletteAt = t + 25 + Math.random() * 15;
    }
  }

  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    if (t - impressions[i * 4 + 2] > IMP_LIFE) impressions[i * 4 + 3] = 0;
  }
  for (let i = chaosEvents.length - 1; i >= 0; i--) {
    if (t - chaosEvents[i].startTime > chaosEvents[i].duration) chaosEvents.splice(i, 1);
  }

  let chromaAmt = 0, mirrorAmt = 0, warpAmt = 0;
  let strobeActive = false, invertActive = false;
  for (const ev of chaosEvents) {
    const age = t - ev.startTime;
    const life = Math.max(0, 1 - age / ev.duration);
    const ease = life * life;
    if (ev.type === 'chroma') chromaAmt += 0.025 * ev.intensity * ease;
    else if (ev.type === 'mirror') mirrorAmt += ev.intensity * ease * 0.7;
    else if (ev.type === 'warp') warpAmt += 0.04 * ev.intensity * ease;
    else if (ev.type === 'strobe') {
      if (Math.sin(t * (20 + ev.param * 40)) > 0) strobeActive = true;
    }
    else if (ev.type === 'invert') invertActive = true;
  }

  stage.dataset.strobe = strobeActive ? '1' : '0';
  stage.dataset.invert = invertActive ? '1' : '0';

  gl.uniform2f(uRes, baseCanvas.width, baseCanvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uChroma, Math.min(chromaAmt, 0.04));
  gl.uniform1f(uMirror, Math.min(mirrorAmt, 1.0));
  gl.uniform1f(uWarp, Math.min(warpAmt, 0.08));
  gl.uniform1f(uPaletteBlend, paletteBlendAmt);
  for (let i = 0; i < 6; i++) {
    gl.uniform3f(uC[i], currentPaletteRgb[i][0], currentPaletteRgb[i][1], currentPaletteRgb[i][2]);
    gl.uniform3f(uCb[i], nextPaletteRgb[i][0], nextPaletteRgb[i][1], nextPaletteRgb[i][2]);
  }
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    gl.uniform4f(uImp[i],
      impressions[i * 4], impressions[i * 4 + 1],
      impressions[i * 4 + 2], impressions[i * 4 + 3]);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  drawOverlay(t);
  requestAnimationFrame(render);
}
render();

}
</script>
