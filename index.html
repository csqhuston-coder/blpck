<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK — Panel Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
#log {
  position: fixed; top: 20px; left: 20px; right: 20px;
  color: #0f0; font-family: monospace; font-size: 11px;
  z-index: 1000; background: rgba(0,0,0,0.8); padding: 10px;
  max-height: 200px; overflow: auto;
  border: 1px solid #0f0;
}

#plusContainer {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 96px; height: 96px;
  z-index: 5;
}
#plus {
  width: 100%; height: 100%;
  cursor: pointer;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
#plus svg { width: 100%; height: 100%; display: block; }

#plusContainer.panelOpen #plus {
  transform: rotate(45deg) scale(0.85);
}

.orbit {
  position: absolute;
  top: 50%; left: 50%;
  width: 59px; height: 59px;
  margin-left: -29.5px;
  margin-top: -29.5px;
  opacity: 0;
  pointer-events: none;
  cursor: pointer;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
}
#plusContainer.panelOpen .orbit {
  opacity: 1;
  pointer-events: auto;
}
.orbit svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<div id="log">waiting...</div>

<div id="plusContainer">
  <div id="plus">
    <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#fff" stroke-width="2.5"/><path d="M 50 28 L 50 72 M 28 50 L 72 50" stroke="#fff" stroke-width="5" stroke-linecap="round"/></svg>
  </div>
</div>

<script>
const log = document.getElementById('log');
function addLog(m) {
  log.innerText = m + '\n' + log.innerText.split('\n').slice(0, 10).join('\n');
}

window.addEventListener('error', (e) => {
  addLog('ERROR: ' + e.message + ' @ line ' + e.lineno);
});

try {
  const plusContainer = document.getElementById('plusContainer');
  const plusBtn = document.getElementById('plus');
  addLog('DOM ready. plus found: ' + !!plusBtn);

  const ORBIT_RADIUS = 155;
  const icons = ['paperclip', 'text', 'mic'];

  // Create orbit icons
  icons.forEach((name, i) => {
    const el = document.createElement('div');
    el.className = 'orbit';
    el.dataset.type = name;
    el.innerHTML = `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#0ff" stroke-width="2.5"/><text x="50" y="57" text-anchor="middle" fill="#0ff" font-size="14" font-family="monospace">${name[0].toUpperCase()}</text></svg>`;
    plusContainer.appendChild(el);
  });
  addLog('Orbit icons created: ' + icons.length);

  let panelOpen = false;

  function placeOrbits() {
    const orbs = plusContainer.querySelectorAll('.orbit');
    orbs.forEach((el, i) => {
      const angle = (i / orbs.length) * Math.PI * 2 - Math.PI / 2;
      const x = Math.cos(angle) * ORBIT_RADIUS;
      const y = Math.sin(angle) * ORBIT_RADIUS;
      if (panelOpen) {
        el.style.transform = `translate(${x}px, ${y}px)`;
      } else {
        el.style.transform = `translate(0, 0)`;
      }
    });
  }
  placeOrbits();

  plusBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    panelOpen = !panelOpen;
    plusContainer.classList.toggle('panelOpen', panelOpen);
    placeOrbits();
    addLog('Click! panelOpen=' + panelOpen);
  });

  addLog('Handlers bound. Tap the +');
} catch (err) {
  addLog('CATCH: ' + err.message);
}
</script>
</body>
</html>
