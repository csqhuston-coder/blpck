<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { document.body.innerHTML = '<div style="color:#444;font-family:monospace;padding:40px;">WebGL required</div>'; } else {

const MAX_IMPRESSIONS = 24;
const IMP_LIFE = 45.0;
const impressions = new Float32Array(MAX_IMPRESSIONS * 4);

const vs = `attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }`;

const fs = `
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform vec4 u_imp[${MAX_IMPRESSIONS}];

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), f.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x), f.y);
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p = p * 2.03 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

float swing(float t) {
  float phase = fract(t);
  if (phase < 0.666) return floor(t) + phase * 0.75;
  return floor(t) + 0.5 + (phase - 0.666) * 1.5;
}

float warpedFbm(vec2 p, float t) {
  vec2 q = vec2(fbm(p + t * 0.05), fbm(p + vec2(5.2, 1.3) - t * 0.04));
  vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.03),
                fbm(p + 4.0 * q + vec2(8.3, 2.8) - t * 0.02));
  return fbm(p + 4.0 * r);
}

void main() {
  vec2 uv = gl_FragCoord.xy / u_res.xy;
  vec2 p = uv;
  p.x *= u_res.x / u_res.y;

  float energy = 0.0;
  vec2 flow = vec2(0.0);
  float heatRecent = 0.0;

  for (int i = 0; i < ${MAX_IMPRESSIONS}; i++) {
    vec4 imp = u_imp[i];
    if (imp.w < 0.001) continue;

    vec2 impP = imp.xy / u_res.xy;
    impP.x *= u_res.x / u_res.y;

    float age = u_time - imp.z;
    float lifeFrac = age / ${IMP_LIFE.toFixed(1)};
    float life = max(0.0, 1.0 - lifeFrac);
    life = life * life * (3.0 - 2.0 * life);

    float dist = distance(p, impP);
    vec2 outward = normalize(p - impP + 0.0001);

    float core = exp(-dist * 10.0) * life;

    float ringAge = min(age, 6.0);
    float ringRadius = ringAge * 0.12;
    float ringWidth = 0.025 + ringAge * 0.004;
    float ring = exp(-pow((dist - ringRadius) / ringWidth, 2.0)) * max(0.0, 1.0 - age / 6.0);

    float wake = smoothstep(ringRadius, 0.0, dist) * smoothstep(0.6, 0.0, dist) * life * 0.4;

    energy += (core * 0.7 + ring * 1.2 + wake * 0.5) * imp.w;
    flow += outward * (ring * 0.6 + core * 0.15) * imp.w;

    if (age < 2.5) {
      heatRecent += (core + ring * 0.8) * imp.w * (1.0 - age / 2.5);
    }
  }

  p += flow * 0.12;

  float T1 = swing(u_time / 7.0) * 7.0;
  float T2 = swing(u_time / 11.0) * 11.0;
  float T3 = swing(u_time / 13.0) * 13.0;
  float T5 = u_time / 5.0;

  vec2 edgeDist = min(uv, 1.0 - uv);
  float edgeNear = 1.0 - smoothstep(0.0, 0.35, min(edgeDist.x, edgeDist.y));
  float cornerPool = (1.0 - smoothstep(0.0, 0.3, edgeDist.x)) * (1.0 - smoothstep(0.0, 0.3, edgeDist.y));

  float n1 = warpedFbm(p * 1.4 + vec2(T1 * 0.3, T2 * 0.2), T1 * 0.1);
  float n2 = warpedFbm(p * 2.6 - vec2(T2 * 0.4, T3 * 0.15), T2 * 0.15);
  float n3 = warpedFbm(p * 4.5 + vec2(T3 * 0.25, T1 * 0.1), T3 * 0.2);

  float w1 = 0.5 + 0.4 * sin(T1 * 0.9);
  float w2 = 0.5 + 0.4 * sin(T2 * 0.7 + 1.3);
  float w3 = 0.5 + 0.4 * sin(T3 * 1.1 + 2.1);
  float wSum = w1 + w2 + w3;
  float n = (n1 * w1 + n2 * w2 + n3 * w3) / wSum;

  n += min(energy, 0.6) * 0.4;
  n += edgeNear * 0.06;
  n += cornerPool * 0.12;

  vec3 col = vec3(0.0);

  float cyc1 = sin(T1 * 0.5) * 0.5 + 0.5;
  float cyc2 = sin(T2 * 0.6 + 1.0) * 0.5 + 0.5;
  float cyc3 = sin(T3 * 0.7 + 2.0) * 0.5 + 0.5;
  float cyc5 = sin(T5 * 0.4 + 3.0) * 0.5 + 0.5;

  col += vec3(0.10, 0.35, 0.65) * smoothstep(0.18, 0.38, n) * (1.0 - smoothstep(0.48, 0.62, n)) * (0.4 + cyc5 * 0.5);
  col += vec3(0.10, 0.06, 0.32) * smoothstep(0.30, 0.55, n) * (1.0 - smoothstep(0.62, 0.78, n)) * (0.7 + cyc1 * 0.4);
  col += vec3(0.04, 0.55, 0.55) * smoothstep(0.48, 0.72, n2) * (0.5 + cyc3 * 0.9);
  col += vec3(0.50, 0.09, 0.38) * smoothstep(0.58, 0.82, n) * (0.4 + cyc2 * 0.7);
  col += vec3(0.95, 0.48, 0.12) * smoothstep(0.75, 0.92, n3) * (0.4 + cyc1 * 0.6);
  col += vec3(0.08, 0.68, 0.30) * smoothstep(0.82, 0.95, n1) * (0.3 + cyc2 * 0.5);

  col += vec3(0.45, 0.2, 0.7) * min(energy, 1.0) * 0.6;
  col += vec3(0.85, 0.6, 1.0) * min(heatRecent, 1.0) * 0.9;

  float tension = 0.82 + sin(T5 * 0.3) * 0.18;
  col *= tension;

  float vig = smoothstep(1.3, 0.3, distance(uv, vec2(0.5)));
  col *= vig * 0.95 + 0.05;

  float grain = (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.03;
  col += grain;

  float lum = dot(col, vec3(0.299, 0.587, 0.114));
  if (lum > 0.88) col *= 0.88 / lum;

  col *= smoothstep(0.0, 5.0, u_time);
  col = pow(col, vec3(1.15));

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog);
gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const pLoc = gl.getAttribLocation(prog, 'p');
gl.enableVertexAttribArray(pLoc);
gl.vertexAttribPointer(pLoc, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uImp = [];
for (let i = 0; i < MAX_IMPRESSIONS; i++) uImp.push(gl.getUniformLocation(prog, `u_imp[${i}]`));

let DPR = Math.min(window.devicePixelRatio || 1, 2);
function resize() {
  canvas.width = window.innerWidth * DPR;
  canvas.height = window.innerHeight * DPR;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
resize();
window.addEventListener('resize', resize);

let impIdx = 0;
const start = performance.now();

function recordImpression(x, y) {
  const now = (performance.now() - start) / 1000;
  const cx = x * DPR;
  const cy = (window.innerHeight - y) * DPR;

  let amplified = false;
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    const iborn = impressions[i * 4 + 2];
    const iint = impressions[i * 4 + 3];
    if (iint > 0.1 && now - iborn < 3.0) {
      const dx = cx - impressions[i * 4];
      const dy = cy - impressions[i * 4 + 1];
      if (Math.sqrt(dx * dx + dy * dy) < 90 * DPR) {
        impressions[i * 4 + 3] = Math.min(1.6, iint + 0.25);
        amplified = true;
        break;
      }
    }
  }
  if (!amplified) {
    impressions[impIdx * 4]     = cx;
    impressions[impIdx * 4 + 1] = cy;
    impressions[impIdx * 4 + 2] = now;
    impressions[impIdx * 4 + 3] = 1.0;
    impIdx = (impIdx + 1) % MAX_IMPRESSIONS;
  }
}

let lastTrack = 0;
function track(x, y) {
  const now = performance.now();
  if (now - lastTrack < 120) return;
  lastTrack = now;
  recordImpression(x, y);
}

canvas.addEventListener('mousemove', e => track(e.clientX, e.clientY));
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  track(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  track(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

function render() {
  const t = (performance.now() - start) / 1000;

  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    if (t - impressions[i * 4 + 2] > IMP_LIFE) impressions[i * 4 + 3] = 0;
  }

  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  for (let i = 0; i < MAX_IMPRESSIONS; i++) {
    gl.uniform4f(uImp[i],
      impressions[i * 4],
      impressions[i * 4 + 1],
      impressions[i * 4 + 2],
      impressions[i * 4 + 3]
    );
  }

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();

}
</script>
</body>
</html>
