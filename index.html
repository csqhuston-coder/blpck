<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLPCK — TOUCH TEST</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; touch-action: none; }
canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; }
#log {
  position: fixed;
  top: 50px;
  left: 20px;
  color: #0f0;
  font-family: monospace;
  font-size: 14px;
  z-index: 10;
  pointer-events: none;
  background: rgba(0,0,0,0.7);
  padding: 8px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="log">waiting for touch...</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const log = document.getElementById('log');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const touches = [];
let touchCount = 0;

function logMsg(m) {
  log.innerText = m;
}

function addTouch(x, y, source) {
  touchCount++;
  touches.push({ x, y, born: performance.now() });
  logMsg(`${source} fired ${touchCount}x — last: ${Math.round(x)},${Math.round(y)}`);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  addTouch(t.clientX, t.clientY, 'touchstart');
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  addTouch(t.clientX, t.clientY, 'touchmove');
}, { passive: false });

canvas.addEventListener('mousedown', e => {
  addTouch(e.clientX, e.clientY, 'mousedown');
});

canvas.addEventListener('mousemove', e => {
  if (e.buttons > 0) addTouch(e.clientX, e.clientY, 'mousemove');
});

function render() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, W, H);

  const now = performance.now();
  for (let i = touches.length - 1; i >= 0; i--) {
    const t = touches[i];
    const age = (now - t.born) / 1000;
    if (age > 5) {
      touches.splice(i, 1);
      continue;
    }
    const life = 1 - age / 5;
    const r = 30 + age * 40;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 50, 100, ${life * 0.4})`;
    ctx.fill();
  }

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
